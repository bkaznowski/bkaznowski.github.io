---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <p class="post-meta">
    {{ page.date | date: "%B %-d, %Y" }}
    {% if page.categories %}
      &middot;
      {% for cat in page.categories %}<span class="tag {{ cat }}">{{ cat }}</span>{% endfor %}
    {% endif %}
  </p>
  {{ content }}
</article>
